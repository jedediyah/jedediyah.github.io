<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<title>Physics Practice</title>

<style>
    :root {
        --primary: #0074d9;
        --primary-dark: #005fa3;
        --bg: #f8f9fa;
        --card-bg: #ffffff;
        --radius: 12px;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
        background: var(--bg);
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
    }

    .container {
        width: 100%;
        max-width: 650px;
    }

    h1 {
        font-size: 1.8rem;
        text-align: center;
        margin-bottom: 20px;
    }

    select, button {
        width: 100%;
        font-size: 1.1rem;
        padding: 12px 15px;
        border-radius: var(--radius);
        border: 1px solid #ccc;
        box-sizing: border-box;
    }

    button {
        background: var(--primary);
        color: white;
        margin-top: 12px;
        border: none;
        cursor: pointer;
        font-weight: 600;
    }

    button:hover {
        background: var(--primary-dark);
    }

    .card {
        background: var(--card-bg);
        border-radius: var(--radius);
        padding: 20px;
        margin-top: 20px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .hidden {
        display: none;
    }

    @media (max-width: 480px) {
        body {
            padding: 10px;
        }

        h1 {
            font-size: 1.5rem;
        }
    }


            .problem {
            margin: 15px 0 25px;
        border: 1px solid gray;
        border-radius: 7px; 
        padding: 5px; 
        }

        .question {
            font-weight: 600;
            margin-bottom: 6px;
        }

        .answer {
            margin-left: 20px;
            color: #555;
            font-style: italic;
        }
</style>

<script src="problems.js"></script>

</head>
<body>

<div class="container">
    <h1>Physics Problems</h1>
    
    <div id="problemDIV"></div>
        
    <script>
    const container = document.getElementById("problemDIV");

for (const topic in problems) {
    const header = document.createElement("h2");
    header.textContent = topic.charAt(0).toUpperCase() + topic.slice(1);
    container.appendChild(header);

    problems[topic].forEach(p => {
        const div = document.createElement("div");
        div.className = "problem";

        div.innerHTML = `
            <div class="question">${p.q}</div>
            <div class="answer">${p.a}</div>
        `;

        container.appendChild(div);
    });
}
    </script>
</div>


</body>
</html>
